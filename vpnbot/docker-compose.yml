version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./config:/app/config  # Mount config dir so you can edit YAMLs without rebuild
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db

  # Optional PostgreSQL — comment out if using SQLite
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpnbot
      POSTGRES_USER: vpnbot
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
